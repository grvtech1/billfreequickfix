name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  smoke:
    name: KB smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Smoke test (KB integrity + generated-file sync + api imports)
        run: node scripts/smoke-test.mjs
